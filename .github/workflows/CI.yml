name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Python
        run: pip install -e ".[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pyright
        run: npm install -g pyright

      - name: Lint
        run: ruff check .
  
      - name: Type check
        run: pyright blackcat/

      - name: Tests
        run: pytest tests/ -m "not llm"
